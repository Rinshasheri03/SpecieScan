{% extends 'Researcher/researcherindex.html' %}

{% block body %}
    <body>
        <style>
            /* Style for centering the form card */
            .form-container {
                max-width: 500px;
                margin: 0 auto;
                padding: 20px;
                border: 1px solid #ccc;
                border-radius: 8px;
                background-color: #f9f9f9;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
                text-align: center;
            }

            /* Style for table and inputs */
            table {
                width: 100%;
                margin: 0 auto;
            }

            td {
                padding: 8px 10px;
                text-align: left;
            }

            input[type="text"], input[type="submit"] {
                width: 100%;
                padding: 10px;
                margin: 8px 0;
                border: 1px solid #ccc;
                border-radius: 4px;
            }

            input[type="submit"] {
                cursor: pointer;
{#                background-color: #4CAF50;#}
                 background-color: #0056b3;
                color: white;
                border: none;
            }

            input[type="submit"]:hover {
{#                background-color: #45a049;#}
                 background-color: #0056b3;
            }
        </style>

        <div class="form-container">
            <form id="form1" name="form1" method="post" action="/updatepassword">
                <table>
                    <tr>
                        <td>Current password</td>
                        <td>
                            <input type="text" name="textfield" required title="Please enter your current password.">
                        </td>
                    </tr>
                    <tr>
                        <td>New password</td>
                        <td>
                            <input type="text" name="textfield2" required pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%?&])[A-Za-z\d@$!%?&]{8,}" title="New password must be at least 8 characters long and include at least one uppercase letter, one lowercase letter, one number, and one special character.">
                        </td>
                    </tr>
                    <tr>
                        <td>Confirm password</td>
                        <td>
                            <input type="text" name="textfield3" required title="Please confirm your new password.">
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <input type="submit" name="Submit" value="Change">
                        </td>
                    </tr>
                </table>
            </form>
        </div>
    </body>
{% endblock %}
